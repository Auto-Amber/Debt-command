// ── STORAGE ───────────────────────────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ── STRATEGY ──────────────────────────────────────────────────────────────────
function computeStrategy(debts, method, extra) {
  if (!debts.length) return [];
  const items = debts.map(d => ({
    ...d,
    bal: parseFloat(d.balance)||0,
    rate: (parseFloat(d.apr)||0)/100/12,
    min: parseFloat(d.minPayment)||0,
    payoffMonth: null, totalInterest: 0
  })).filter(d=>d.bal>0)
    .sort((a,b)=> method==="avalanche" ? b.rate-a.rate : a.bal-b.bal);

  let month=0;
  const MAX=600;
  while(items.some(d=>d.bal>0) && month<MAX){
    month++;
    let pool = parseFloat(extra)||0;
    items.forEach(d=>{
      if(d.bal>0){
        const interest = d.bal*d.rate;
        d.bal += interest;
        d.totalInterest += interest;
        const pay = Math.min(Math.max(d.min, interest+1), d.bal);
        d.bal -= pay;
      }
    });
    for(const d of items){
      if(d.bal>0 && pool>0){ const pay=Math.min(pool,d.bal); d.bal-=pay; pool-=pay; }
    }
    items.forEach(d=>{ if(d.bal<=0.01&&d.payoffMonth===null){d.bal=0;d.payoffMonth=month;} });
  }
  return items;
}

function monthLabel(n){
  if(!n) return "—";
  const d=new Date(); d.setMonth(d.getMonth()+n);
  return d.toLocaleDateString("en-US",{month:"short",year:"numeric"});
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
const IS = { width:"100%", background:C.surface, border:`1px solid ${C.border}`, borderRadius:7, color:C.text, fontSize:14, padding:"9px 11px", outline:"none", boxSizing:"border-box" };

function Input({style,...p}){ return <input style={{...IS,...style}} {...p}/>; }
function Sel({children,...p}){ return <select style={{...IS}} {...p}>{children}</select>; }

function Btn({onClick,children,variant="primary",small,danger,style={}}){
  const bg=danger?C.red:variant==="primary"?C.accent:C.card;
  const col=danger?"#fff":variant==="primary"?"#0d0f14":C.muted;
  return <button onClick={onClick} style={{background:bg,color:col,border:danger?"none":`1px solid ${C.border}`,borderRadius:7,padding:small?"6px 14px":"9px 20px",fontSize:small?12:14,fontWeight:600,cursor:"pointer",...style}}>{children}</button>;
}

function Field({label,children}){
  return <div style={{marginBottom:14}}>
    <label style={{display:"block",color:C.muted,fontSize:11,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:5}}>{label}</label>
    {children}
  </div>;
}

function Modal({title,onClose,children}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}>
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:480,boxShadow:"0 24px 64px rgba(0,0,0,.6)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 22px 14px",borderBottom:`1px solid ${C.border}`}}>

        <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:22,lineHeight:1}}>×</button>
      </div>
      <div style={{padding:"20px 22px 24px"}}>{children}</div>
    </div>
  </div>;
}

// ── FORMS ─────────────────────────────────────────────────────────────────────

  return <>
    <Field label="Creditor / Card Name"><Input placeholder="e.g. Chase Slate" value={f.name} onChange={s("name")}/></Field>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

      <Field label="APR (%)"><Input type="number" placeholder="24.99" value={f.apr} onChange={s("apr")}/></Field>
      <Field label="Min Payment ($)"><Input type="number" placeholder="25" value={f.minPayment} onChange={s("minPayment")}/></Field>
      <Field label="Due Day"><Input type="number" placeholder="15" min="1" max="31" value={f.dueDay} onChange={s("dueDay")}/></Field>

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab] = useState("debts");
  const [debts,setDebts] = useState(()=>load("dc_debts",SEED_DEBTS));
  const [bills,setBills] = useState(()=>load("dc_bills",SEED_BILLS));
  const [income,setIncome] = useState(()=>load("dc_income",SEED_INCOME));
  const [method,setMethod] = useState(()=>load("dc_method","avalanche"));
  const [extra,setExtra] = useState(()=>load("dc_extra",1467));
  const [modal,setModal] = useState(null);

  // auto-save
  useEffect(()=>save("dc_debts",debts),[debts]);
  useEffect(()=>save("dc_bills",bills),[bills]);
  useEffect(()=>save("dc_income",income),[income]);
  useEffect(()=>save("dc_method",method),[method]);
  useEffect(()=>save("dc_extra",extra),[extra]);

  const totalDebt = debts.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const totalBills = bills.reduce((s,b)=>s+(parseFloat(b.amount)||0),0);
  const totalMins = debts.reduce((s,d)=>s+(parseFloat(d.minPayment)||0),0);
  const totalIncome = income.reduce((s,i)=>{
    const a=parseFloat(i.amount)||0;
    if(i.frequency==="biweekly") return s+a*2;
    if(i.frequency==="weekly") return s+a*4.33;
    return s+a;
  },0);
  const netAvailable = totalIncome - totalBills - totalMins;

  const TABS = [
    {id:"debts",   label:`Debts (${debts.length})`},
    {id:"bills",   label:`Bills (${bills.length})`},
    {id:"income",  label:`Income (${income.length})`},
    {id:"strategy",label:"Strategy"},
    {id:"cashflow",label:"Cash Flow"},
  ];

  // ── STRATEGY ──
  function StrategyView(){
    const results = computeStrategy(debts,method,extra);
    const totalInt = results.reduce((s,d)=>s+(d.totalInterest||0),0);
    const lastMonth = Math.max(...results.map(d=>d.payoffMonth||0));
    return <div>
      {/* summary */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:24}}>
        {[
          {label:"Total Debt",        val:fmt(totalDebt),  color:C.red},
          {label:"Est. Total Interest",val:fmt(totalInt),  color:C.accent},
          {label:"Debt-Free By",       val:monthLabel(lastMonth), color:C.green},
        ].map(c=><div key={c.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 18px",borderTop:`3px solid ${c.color}`}}>
          <div style={{color:C.muted,fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:6}}>{c.label}</div>
          <div style={{color:c.color,fontSize:20,fontWeight:700,fontFamily:"monospace"}}>{c.val}</div>
        </div>)}
      </div>

      {/* controls */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 18px",marginBottom:20}}>
        <div style={{display:"flex",gap:20,flexWrap:"wrap",alignItems:"flex-end"}}>
          <div>
            <div style={{color:C.muted,fontSize:11,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8}}>Method</div>
            <div style={{display:"flex",gap:8}}>
              {["avalanche","snowball"].map(m=><button key={m} onClick={()=>setMethod(m)} style={{padding:"7px 16px",borderRadius:7,border:`1px solid ${method===m?C.accent:C.border}`,background:method===m?C.accent:C.card,color:method===m?"#0d0f14":C.muted,fontWeight:600,fontSize:13,cursor:"pointer",textTransform:"capitalize"}}>{m}</button>)}
            </div>
            <div style={{color:C.label,fontSize:11,marginTop:5}}>{method==="avalanche"?"Highest APR first — saves most interest":"Lowest balance first — fastest wins"}</div>
          </div>
          <div>
            <div style={{color:C.muted,fontSize:11,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8}}>Extra Monthly Payment</div>
            <Input type="number" value={extra} onChange={e=>setExtra(e.target.value)} style={{width:160}}/>
            <div style={{color:netAvailable>0?C.green:C.red,fontSize:11,marginTop:5}}>~{fmt(netAvailable)} available after mins + bills</div>
          </div>
        </div>
      </div>

      {/* payoff list */}
      <div style={{color:C.muted,fontSize:11,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:10}}>
        Payoff Order — {method==="avalanche"?"Highest APR → Lowest":"Lowest Balance → Highest"}
      </div>
      {results.map((d,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:C.card,border:`1px solid ${C.border}`,borderLeft:`4px solid ${i===0?C.accent:C.border}`,borderRadius:"0 8px 8px 0",marginBottom:6}}>
        <div style={{minWidth:26,height:26,borderRadius:"50%",background:i===0?C.accent:C.surface,color:i===0?"#0d0f14":C.muted,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>{i+1}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:C.text,fontWeight:600,fontSize:14,marginBottom:2}}>{d.name}</div>
          <div style={{color:C.muted,fontSize:12}}>{fmt(parseFloat(d.balance))} · {pct(d.apr)} APR</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:C.accent,fontSize:12,marginBottom:2}}>+{fmt(d.totalInterest)} interest</div>
          <div style={{color:C.green,fontWeight:700,fontSize:14}}>{monthLabel(d.payoffMonth)}</div>
        </div>
      </div>)}
    </div>;
  }

  // ── CASH FLOW ──
  function CashFlowView(){
    const events = [
      ...income.map(i=>({type:"income",label:i.source,amount:parseFloat(i.amount)||0,day:parseInt(i.day)||1,freq:i.frequency})),
      ...bills.map(b=>({type:"bill",label:b.name,amount:parseFloat(b.amount)||0,day:parseInt(b.dueDay)||0})),

    return <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:24}}>
        {[
          {label:"Monthly Income",  val:fmt(totalIncome), color:C.green},
          {label:"Monthly Bills",   val:fmt(totalBills),  color:C.muted},
          {label:"Debt Minimums",   val:fmt(totalMins),   color:C.red},
          {label:"Net Available",   val:fmt(netAvailable),color:netAvailable>=0?C.accent:C.red},
        ].map(c=><div key={c.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px"}}>
          <div style={{color:C.muted,fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:4}}>{c.label}</div>
          <div style={{color:c.color,fontSize:20,fontWeight:700,fontFamily:"monospace"}}>{c.val}</div>
        </div>)}
      </div>
      <div style={{color:C.muted,fontSize:11,letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:10}}>Monthly Schedule — by Day</div>
      {events.map((e,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",background:C.card,border:`1px solid ${C.border}`,borderLeft:`4px solid ${e.type==="income"?C.green:e.type==="debt"?C.red:C.accent}`,borderRadius:"0 8px 8px 0",marginBottom:5}}>
        <div style={{minWidth:30,height:30,borderRadius:7,background:e.type==="income"?"#1a3d2b":e.type==="debt"?"#3d1a1a":"#2a2210",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:e.type==="income"?C.green:e.type==="debt"?C.red:C.accent}}>{e.day}</div>
        <div style={{flex:1,color:C.text,fontSize:14}}>{e.label}{e.freq&&e.freq!=="monthly"?<span style={{color:C.muted,fontSize:11,marginLeft:6,textTransform:"capitalize"}}>{e.freq}</span>:null}</div>
        <span style={{fontFamily:"monospace",fontSize:14,fontWeight:700,color:e.type==="income"?C.green:C.text}}>{e.type==="income"?"+":"-"}{fmt(e.amount)}</span>
      </div>)}
    </div>;
  }

  // ── LIST ROWS ──

        <div style={{color:C.muted,fontSize:12}}>min {fmt(d.minPayment)}</div>
      </div>

  function BillRow({b,idx}){
    return <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,marginBottom:5}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{color:C.text,fontWeight:600,fontSize:14}}>{b.name}</div>
        {b.notes?<div style={{color:C.muted,fontSize:11,marginTop:2}}>{b.notes}</div>:null}
      </div>
      <div style={{textAlign:"right",marginRight:8}}>

    </div>;
  }

  return <div style={{background:C.bg,minHeight:"100vh",color:C.text,paddingBottom:60}}>
    {/* HEADER */}
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
      <div>
        <div style={{fontSize:20,fontWeight:800,letterSpacing:"-0.5px"}}>
          <span style={{color:C.accent}}>DEBT</span><span style={{color:C.text}}> COMMAND</span>
        </div>
        <div style={{color:C.muted,fontSize:10,letterSpacing:"2px",textTransform:"uppercase"}}>Payoff Strategy Planner</div>
      </div>
      <div style={{color:C.muted,fontSize:12,textAlign:"right"}}>
        <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"1px",marginBottom:2}}>Today</div>
        <div style={{fontFamily:"monospace",color:C.text}}>{new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
      </div>
    </div>

    <div style={{maxWidth:700,margin:"0 auto",padding:"20px 14px 0"}}>
      {/* TABS */}
      <div style={{display:"flex",gap:2,background:C.surface,borderRadius:10,padding:4,marginBottom:24,overflowX:"auto"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:"0 0 auto",padding:"8px 12px",borderRadius:7,border:"none",background:tab===t.id?C.accent:"none",color:tab===t.id?"#0d0f14":C.muted,fontWeight:tab===t.id?700:500,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>{t.label}</button>)}
      </div>

      {/* DEBTS */}
      {tab==="debts"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{color:C.muted,fontSize:12}}>Total: <span style={{color:C.accent,fontFamily:"monospace",fontWeight:700}}>{fmt(totalDebt)}</span></div>
          <Btn onClick={()=>setModal({type:"addDebt"})}>+ Add Debt</Btn>
        </div>
        {debts.map((d,i)=><DebtRow key={i} d={d} idx={i}/>)}
      </div>}

      {/* BILLS */}
      {tab==="bills"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{color:C.muted,fontSize:12}}>Total: <span style={{color:C.text,fontFamily:"monospace",fontWeight:700}}>{fmt(totalBills)}/mo</span></div>
          <Btn onClick={()=>setModal({type:"addBill"})}>+ Add Bill</Btn>
        </div>
        {bills.map((b,i)=><BillRow key={i} b={b} idx={i}/>)}
      </div>}

      {/* INCOME */}
      {tab==="income"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{color:C.muted,fontSize:12}}>Monthly: <span style={{color:C.green,fontFamily:"monospace",fontWeight:700}}>{fmt(totalIncome)}</span></div>
          <Btn onClick={()=>setModal({type:"addIncome"})}>+ Add Income</Btn>
        </div>
        {income.map((inc,i)=><IncomeRow key={i} inc={inc} idx={i}/>)}
      </div>}

      {/* STRATEGY */}
      {tab==="strategy"&&<StrategyView/>}

      {/* CASH FLOW */}
      {tab==="cashflow"&&<CashFlowView/>}
    </div>

    {/* MODALS */}
    {modal?.type==="addDebt"&&<Modal title="Add Debt" onClose={()=>setModal(null)}><DebtForm onSave={f=>setDebts(p=>[...p,f])} onClose={()=>setModal(null)}/></Modal>}
    {modal?.type==="editDebt"&&<Modal title="Edit Debt" onClose={()=>setModal(null)}><DebtForm item={modal.item} onSave={f=>setDebts(p=>p.map((d,i)=>i===modal.idx?f:d))} onClose={()=>setModal(null)}/></Modal>}
    {modal?.type==="addBill"&&<Modal title="Add Bill" onClose={()=>setModal(null)}><BillForm onSave={f=>setBills(p=>[...p,f])} onClose={()=>setModal(null)}/></Modal>}
    {modal?.type==="editBill"&&<Modal title="Edit Bill" onClose={()=>setModal(null)}><BillForm item={modal.item} onSave={f=>setBills(p=>p.map((b,i)=>i===modal.idx?f:b))} onClose={()=>setModal(null)}/></Modal>}
    {modal?.type==="addIncome"&&<Modal title="Add Income" onClose={()=>setModal(null)}><IncomeForm onSave={f=>setIncome(p=>[...p,f])} onClose={()=>setModal(null)}/></Modal>}
    {modal?.type==="editIncome"&&<Modal title="Edit Income" onClose={()=>setModal(null)}><IncomeForm item={modal.item} onSave={f=>setIncome(p=>p.map((inc,i)=>i===modal.idx?f:inc))} onClose={()=>setModal(null)}/></Modal>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
